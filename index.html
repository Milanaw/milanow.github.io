<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoş Geldiniz</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
}

.kutu{
    text-align:center;
    background:#1f1f1f;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

a{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#e60023;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

a:hover{
    background:#c0001b;
}
</style>
</head>

<body>

<div class="kutu">
    <h1>Hoş Geldiniz</h1>
    <p>Bu web sitesi GitHub Pages ile oluşturulmuştur.</p>
    <a href="https://www.pinterest.com/" target="_blank">Pinterest</a>
</div>

</body>
</html>
